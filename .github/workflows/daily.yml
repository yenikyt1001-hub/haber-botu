name: Haber Botu Otomatik Calistir

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı otomatik çalışır
  workflow_dispatch: # İstediğin zaman manuel başlatman için buton açar

jobs:
  haber_paylas:
    runs-on: ubuntu-latest
    # Dosya güncelleyip geri yükleyebilmesi için yazma izni veriyoruz
    permissions:
      contents: write

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4 # Güncel sürüm (Node.js hatasını çözer)

      - name: Python Kur
        uses: actions/setup-python@v5 # Güncel sürüm
        with:
          python-version: '3.10'

      - name: Bagimliliklari Yukle
        run: |
          pip install feedparser google-genai requests

      - name: Botu Calistir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADRESIN: ${{ secrets.GMAIL_ADRESIN }}
          GMAIL_UYGULAMA_SIFRESI: ${{ secrets.GMAIL_UYGULAMA_SIFRESI }}
          BLOGGER_MAIL: ${{ secrets.BLOGGER_MAIL }}
        run: python haber_botu.py

      - name: Hafizayi Guncelle ve Push Et
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add haber_hafiza.txt
          # Eğer yeni haber yoksa ve dosya değişmediyse hata vermemesi için || true ekledik
          git commit -m "Haber hafizası güncellendi [skip ci]" || true
          git push
