name: Haber Botu Otomatik Calistir

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı çalışır
  workflow_dispatch: # El ile başlatma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bagimliliklari Yukle
        run: pip install feedparser google-genai requests

      - name: Botu Calistir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADRESIN: ${{ secrets.GMAIL_ADRESIN }}
          GMAIL_UYGULAMA_SIFRESI: ${{ secrets.GMAIL_UYGULAMA_SIFRESI }}
          BLOGGER_MAIL: ${{ secrets.BLOGGER_MAIL }}
        # BURASI KRİTİK: Dosya adın haberci.py olduğu için böyle olmalı
        run: python haberci.py 

      - name: Hafizayi Guncelle
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add haber_hafiza.txt
          git commit -m "Hafiza guncellendi [skip ci]" || exit 0
          git push
