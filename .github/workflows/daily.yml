name: Haber Botu Otomatik Calistir

on:
  schedule:
    # Her 30 dakikada bir çalışır
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4
        with:
          # Hafıza güncellemesi için en güncel hali çekmesini garantileyelim
          fetch-depth: 0

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bagimliliklari Yukle
        run: pip install feedparser google-genai requests

      - name: Botu Calistir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADRESIN: ${{ secrets.GMAIL_ADRESIN }}
          GMAIL_UYGULAMA_SIFRESI: ${{ secrets.GMAIL_UYGULAMA_SIFRESI }}
          BLOGGER_MAIL: ${{ secrets.BLOGGER_MAIL }}
        run: python haberci.py

      - name: Hafizayi Guncelle
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add haber_hafiza.txt
          # Sadece değişiklik varsa commit at, yoksa hata vermeden çık
          git diff-index --quiet HEAD || (git commit -m "Hafiza guncellendi [skip ci]" && git push)
